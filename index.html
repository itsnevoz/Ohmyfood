<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a1f6298eb5.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./style.css">
    <title>Ohmyfood</title>
</head>
<body>
    <!--Header-->
    <header>
        <!--Logo-->
        <div class="flex flex__Center padding padding__nav">
            <img src="./images/logo/ohmyfood.png" alt="Logo ohmyfood">
        </div>
        <!--Emplacement-->
        <div class="flex flex__Center background background__grey">
            <i class="fa-solid fa-location-dot"></i>
            <h2 class="flex flex__Center padding padding__nav">Paris, Belleville</h2>
        </div>
    </header> 
    <!--Reservez section-->
    <section class="background background__lightgrey padding padding__reservez">
        <h1 class="flex flex__Center margin margin__reservez">Réservez le menu qui vous convient</h1>
        <p class="flex flex__Center ">Découvrez des restaurants d'exeption, séléctionnés par nos soins.</p>
        <div class="flex flex__Center">
            <a class="button button__reservation"><strong>Explorer nos restaurants</strong></a>
        </div>
    </section> 
    <!--fonctionnement-->
    <section>
        <h1 class="margin margin__side">Fonctionnement</h1>
        <div class="flex flex__ColumCenter">
            <div class="flex flex__Center button button__fonc">
                <i class="fa-solid fa-mobile-screen-button"></i>
                <p>Choisissez un restaurant</p>
            </div>
            <div class="flex flex__Center button button__fonc">
                <i class="fa-solid fa-bars"></i>
                <p>Composez votre menu</p>
            </div>
            <div class="flex flex__Center button button__fonc">
                <i class="fa-solid fa-store"></i>
                <p>Degustez au restaurant</p>
            </div>
        </div>
    </section>
    <!--Restaurant-->
    <section class="margin margin__side">
        <h1>Restaurant</h1>
    </section>
</body>
</html>
